version: "3.9"

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sentielai}
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sentinel123}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://sentinel:sentinel123@db:5432/sentielai
      - REDIS_URL=redis://redis:6379/0
      - OVERPASS_API_URL=https://overpass-api.de/api/interpreter
      - NOMINATIM_URL=https://nominatim.openstreetmap.org
      - SECRET_KEY=3eb634de-c866-4190-b18c-8cb0b60b299e
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app.celery worker --loglevel=info
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://sentinel:sentinel123@db:5432/sentielai
      - REDIS_URL=redis://redis:6379/0
      - OVERPASS_API_URL=https://overpass-api.de/api/interpreter
      - NOMINATIM_URL=https://nominatim.openstreetmap.org
    depends_on:
      - db
      - redis

  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.celery_app.celery beat --loglevel=info
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://sentinel:sentinel123@db:5432/sentielai
      - REDIS_URL=redis://redis:6379/0
      - OVERPASS_API_URL=https://overpass-api.de/api/interpreter
      - NOMINATIM_URL=https://nominatim.openstreetmap.org
    depends_on:
      - db
      - redis

volumes:
  pgdata:
